name: Build and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained -o ./publish

      - name: Pack with Velopack
        shell: bash
        run: |
          # Перетворюємо v1.0.7 -> 1.0.7
          VERSION=${GITHUB_REF_NAME#v}
          
          MAIN_EXE=$(ls ./publish | grep -E '(\.exe|[^.]+)$' | head -n 1)
          
          echo "Detected Main Exe: $MAIN_EXE"
          
          vpk pack --packId "IsolationProtocol" \
                   --packVersion "$VERSION" \
                   --packTitle "Isolation Protocol" \
                   --packDir ./publish \
                   --mainExe "$MAIN_EXE"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./releases/*.exe
            ./releases/*.AppImage
            ./releases/*.zip
            ./releases/*.pkg
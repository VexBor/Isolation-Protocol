name: Build Installers
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0' 

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish App
        run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained -o ./publish

      - name: Create Installer
        run: |
          vpk pack --id "IsolationProtocol" \
                   --version "${{ github.ref_name }}" \
                   --packDir ./publish \
                   --mainExe "IsolationProtocol.exe" # Для Linux просто "IsolationProtocol"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./releases/*
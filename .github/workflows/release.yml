name: Build and Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained -o "./publish"

      - name: Pack with Velopack
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            EXE_NAME="Isolation Protocol.exe"
          else
            EXE_NAME="Isolation Protocol"
          fi

          vpk pack --packId "IsolationProtocol" \
                   --packVersion "$VERSION" \
                   --packTitle "Isolation Protocol" \
                   --packDir "./publish" \
                   --mainExe "$EXE_NAME"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2 # Оновив версію екшена
        with:
          files: |
            releases/**/*.exe
            releases/**/*.AppImage
            releases/**/*.zip
            releases/**/*.nupkg
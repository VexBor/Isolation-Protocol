name: Build and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Щоб помилка на одній ОС не зупиняла іншу
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained -o "./publish"

      - name: Pack with Velopack
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          
          # Визначаємо назву файлу залежно від ОС (враховуємо пробіл)
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            EXE_NAME="Isolation Protocol.exe"
          else
            EXE_NAME="Isolation Protocol"
          fi

          vpk pack --packId "IsolationProtocol" \
                   --packVersion "$VERSION" \
                   --packTitle "Isolation Protocol" \
                   --packDir "./publish" \
                   --mainExe "$EXE_NAME"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./releases/*.exe
            ./releases/*.AppImage
            ./releases/*.zip
name: Build and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained -o ./publish

      - name: Pack with Velopack
        run: |
          vpk pack --packId "IsolationProtocol" \
                   --packVersion "${{ github.ref_name | replace('v', '') }}" \
                   --packTitle "Isolation Protocol" \
                   --packDir ./publish \
                   --mainExe "IsolationProtocol.exe"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./releases/*.exe
            ./releases/*.AppImage
            ./releases/*.zip